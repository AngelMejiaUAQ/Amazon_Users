service: taller-users
frameworkVersion: "4"

plugins:
  - serverless-localstack

custom:
  localstack:
    stages: [local]
    host: http://localhost
    edgePort: 4566
    autoStart: false

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'local'}
  region: us-east-1
  environment:
    STAGE: ${self:provider.stage}
    JWT_SECRET: ${ssm:/taller/${self:provider.stage}/jwt-secret}
    JWT_REFRESH_SECRET: ${ssm:/taller/${self:provider.stage}/jwt-refresh-secret}
    CORS_ORIGINS: ${file(./config/config-${self:provider.stage}.json):CORS_ORIGINS}
    USERS_TABLE: !Ref UsersTable
    REFRESH_TOKENS_TABLE: !Ref RefreshTokensTable

  apiGateway:
    restApiId: !ImportValue ${self:provider.stage}-MainRestApiId
    restApiRootResourceId: !ImportValue ${self:provider.stage}-MainRestApiRootResourceId

  iamRoleStatements:
    - Effect: Allow
      Action:
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "*"
    - Effect: Allow
      Action:
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:Query
      Resource:
        - !GetAtt UsersTable.Arn
        - !Sub "${UsersTable.Arn}/index/*"
        - !GetAtt RefreshTokensTable.Arn

    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:BatchGetItem
        - dynamodb:BatchWriteItem
        - dynamodb:DescribeTable
      Resource:
        - !GetAtt UsersTable.Arn
        - !Sub "${UsersTable.Arn}/index/*"
        - !GetAtt RefreshTokensTable.Arn

functions:
  register:
    name: taller-${self:provider.stage}-Users-Register
    handler: src/handlers/register.register
    events:
      - http:
          method: post
          path: /users/register
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Api-Key
              - X-Amz-Date
              - X-Amz-Security-Token
  login:
    handler: src/handlers/login.login
    events:
      - http:
          method: post
          path: /users/login
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Api-Key
              - X-Amz-Date
              - X-Amz-Security-Token
  getUser:
    handler: src/handlers/getUser.getUser
    events:
      - http:
          method: get
          path: /users/{id}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Api-Key
              - X-Amz-Date
              - X-Amz-Security-Token
          authorizer:
            type: CUSTOM
            authorizerId: !ImportValue ${self:provider.stage}-MainAuthorizerId
  updateUser:
    handler: src/handlers/updateUser.updateUser
    events:
      - http:
          method: put
          path: /users/{id}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Api-Key
              - X-Amz-Date
              - X-Amz-Security-Token
          authorizer:
            type: CUSTOM
            authorizerId: !ImportValue ${self:provider.stage}-MainAuthorizerId
  deleteUser:
    handler: src/handlers/deleteUser.deleteUser
    events:
      - http:
          method: delete
          path: /users/{id}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Api-Key
              - X-Amz-Date
              - X-Amz-Security-Token
          authorizer:
            type: CUSTOM
            authorizerId: !ImportValue ${self:provider.stage}-MainAuthorizerId

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-users
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    RefreshTokensTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-refresh-tokens
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: token
            AttributeType: S
        KeySchema:
          - AttributeName: token
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true